<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otto GR — Dashboard</title>
<link rel="stylesheet" href="../css/main.css"/>
<style>
  .page { flex:1; padding:20px; overflow-y:auto; background:#f5f5f5; }
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .page-header h1 { font-size:18px; font-weight:700; color:#111; }
  .filters { display:flex; gap:8px; align-items:center; }
  .date-input { border:1px solid #ddd; border-radius:4px; padding:6px 10px; font-size:12px; background:#fff; }
  .btn-filter { background:#d4a017; color:#111; border:none; padding:6px 14px; border-radius:4px; font-size:12px; font-weight:700; cursor:pointer; }

  .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .summary-card { background:#fff; border-radius:8px; padding:16px; border-top:4px solid #d4a017; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .summary-card.danger { border-top-color:#ef4444; }
  .summary-card.ok { border-top-color:#10b981; }
  .summary-card.blue { border-top-color:#3b82f6; }
  .summary-value { font-size:28px; font-weight:800; color:#111; margin-bottom:2px; }
  .summary-label { font-size:12px; color:#888; }

  .table-card { background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.08); overflow:hidden; margin-bottom:20px; }
  .table-header { padding:14px 16px; border-bottom:2px solid #d4a017; display:flex; align-items:center; justify-content:space-between; }
  .table-header h2 { font-size:14px; font-weight:700; color:#111; }
  .search-input { border:1px solid #ddd; border-radius:4px; padding:6px 10px; font-size:12px; width:200px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:#f9f9f9; padding:10px 12px; text-align:left; font-size:11px; color:#555; font-weight:700; text-transform:uppercase; border-bottom:1px solid #eee; cursor:pointer; user-select:none; }
  th:hover { color:#d4a017; }
  td { padding:10px 12px; border-bottom:1px solid #f0f0f0; }
  tr:hover td { background:#fffbf0; }
  .badge-danger { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; }
  .badge-ok { background:#f0fdf4; color:#16a34a; border:1px solid #86efac; padding:2px 8px; border-radius:12px; font-size:11px; }
  .bar { height:6px; background:#e5e7eb; border-radius:3px; width:80px; display:inline-block; vertical-align:middle; margin-left:6px; }
  .bar-fill { height:100%; border-radius:3px; background:#d4a017; }
  .bar-fill.danger { background:#ef4444; }
  .loading { text-align:center; padding:40px; color:#888; font-size:14px; }

  /* Abas frota */
  .frota-card { background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.08); overflow:hidden; }
  .frota-tabs { display:flex; border-bottom:2px solid #d4a017; }
  .frota-tab { padding:12px 24px; font-size:13px; font-weight:700; color:#888; background:transparent; border:none; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; }
  .frota-tab.active { color:#111; border-bottom-color:#d4a017; }
  .frota-tab:hover { color:#d4a017; }
  .frota-search { padding:10px 16px; border-bottom:1px solid #eee; display:flex; gap:8px; align-items:center; }
  .frota-search input { border:1px solid #ddd; border-radius:4px; padding:6px 10px; font-size:12px; flex:1; }
  .frota-content { overflow-x:auto; }

  .status-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; }
  .s-transito { background:#dbeafe; color:#1d4ed8; }
  .s-carregar { background:#fef3c7; color:#92400e; }
  .s-carregado { background:#ede9fe; color:#5b21b6; }
  .s-descarga { background:#d1fae5; color:#065f46; }
  .s-vazio { background:#f3f4f6; color:#374151; }
  .s-manutencao { background:#fee2e2; color:#991b1b; }
  .placa-mono { font-family:'IBM Plex Mono',monospace; font-weight:700; }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">
    <img src="../img/logo.jpg" alt="Otto GR" onerror="this.style.display='none'"/>
    <div class="logo-name">Otto Gerenciadora de Risco</div>
  </div>
  <nav class="nav-links">
    <a href="index.html">🗺 Mapa ao vivo</a>
    <a href="routes.html">🛣 Rotas</a>
    <a href="vehicles.html">🚛 Veículos</a>
    <a href="viagens.html">📦 Viagens</a>
    <a href="alerts.html">⚠️ Alertas</a>
    <a href="reports.html" class="active">📊 Dashboard</a>
  </nav>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📊 Dashboard de Desempenho</h1>
    <div class="filters">
      <input type="date" class="date-input" id="date-start"/>
      <span style="font-size:12px;color:#888">até</span>
      <input type="date" class="date-input" id="date-end"/>
      <button class="btn-filter" onclick="carregarDashboard()">Filtrar</button>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card blue"><div class="summary-value" id="total-veiculos">—</div><div class="summary-label">Veículos monitorados</div></div>
    <div class="summary-card danger"><div class="summary-value" id="total-excessos">—</div><div class="summary-label">Excessos de velocidade</div></div>
    <div class="summary-card ok"><div class="summary-value" id="total-movendo">—</div><div class="summary-label">Veículos em movimento agora</div></div>
    <div class="summary-card"><div class="summary-value" id="total-parado">—</div><div class="summary-label">Veículos parados agora</div></div>
  </div>

  <div class="table-card" style="margin-bottom:20px">
    <div class="table-header">
      <h2 id="table-title">Desempenho por Veículo</h2>
      <input class="search-input" id="search" placeholder="🔍 Buscar placa..." oninput="filtrarTabela()"/>
    </div>
    <div id="table-container"><div class="loading">⏳ Carregando dados...</div></div>
  </div>

  <!-- Abas Frota -->
  <div class="frota-card">
    <div class="frota-tabs">
      <button class="frota-tab active" id="ft-RODOTREM" onclick="setFrotaTab('RODOTREM')">🚛 Rodotrem</button>
      <button class="frota-tab" id="ft-LS" onclick="setFrotaTab('LS')">🚚 LS</button>
    </div>
    <div class="frota-search">
      <input id="frota-search" placeholder="🔍 Buscar placa, motorista, destino..." oninput="filtrarFrota()"/>
      <span id="frota-count" style="font-size:12px;color:#888;white-space:nowrap"></span>
    </div>
    <div class="frota-content">
      <div id="frota-table"><div class="loading">⏳ Carregando frota...</div></div>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
let dadosOriginais = [];
let viagensMap = {};
let sortCol = 'excessos';
let sortDir = -1;

const hoje = new Date();
document.getElementById('date-start').value = '2026-03-26';
document.getElementById('date-end').value = hoje.toISOString().slice(0,10);

async function carregarViagens() {
  try {
    const res = await fetch(CONFIG.API_URL + '/api/viagens');
    const viagens = await res.json();
    viagensMap = {};
    viagens.forEach(function(v) { if(v.placa) viagensMap[v.placa] = v; });
  } catch(e) {}
}

async function carregarDashboard() {
  document.getElementById('table-container').innerHTML = '<div class="loading">Carregando...</div>';
  const start = document.getElementById('date-start').value;
  const end = document.getElementById('date-end').value;
  const startLabel = new Date(start+'T12:00:00').toLocaleDateString('pt-BR');
  const endLabel = new Date(end+'T12:00:00').toLocaleDateString('pt-BR');
  document.getElementById('table-title').textContent = 'Desempenho por Veículo — ' + startLabel + ' a ' + endLabel;

  await carregarViagens();

  try {
    const url = CONFIG.API_URL + '/api/dashboard?start=' + start + '&end=' + end;
    const res = await fetch(url);
    let dados = await res.json();
    if (!Array.isArray(dados)) dados = [];

    let totalExcessos=0, movendo=0, parado=0;
    dados.forEach(function(d) {
      totalExcessos += parseInt(d.excessos)||0;
      if ((parseInt(d.ultima_vel)||0) > 5) movendo++; else parado++;
    });

    document.getElementById('total-veiculos').textContent = dados.length;
    document.getElementById('total-excessos').textContent = totalExcessos.toLocaleString('pt-BR');
    document.getElementById('total-movendo').textContent = movendo;
    document.getElementById('total-parado').textContent = parado;
    dadosOriginais = dados;
    renderTabela(dados);
  } catch(e) {
    document.getElementById('table-container').innerHTML = '<div class="loading" style="color:#ef4444">Erro ao carregar.</div>';
  }
}

function formatarTempo(minutos) {
  minutos = parseInt(minutos)||0;
  if (minutos===0) return '—';
  const h = Math.floor(minutos/60), m = minutos%60;
  return h>0 ? h+'h '+m+'min' : m+'min';
}

function renderTabela(dados) {
  const sorted = dados.slice().sort(function(a,b) {
    return ((parseFloat(a[sortCol])||0)-(parseFloat(b[sortCol])||0))*sortDir;
  });
  const maxExc = Math.max.apply(null, dados.map(function(d){return parseInt(d.excessos)||0;}).concat([1]));
  const maxMov = Math.max.apply(null, dados.map(function(d){return parseInt(d.minutos_movendo)||0;}).concat([1]));
  const arrow = function(col){return sortCol===col?(sortDir>0?'↑':'↓'):'';};

  let rows='';
  sorted.forEach(function(d) {
    const exc=parseInt(d.excessos)||0;
    const mov=parseInt(d.minutos_movendo)||0;
    const par=parseInt(d.minutos_parado)||0;
    const velMax=parseInt(d.vel_max)||0;
    const ultimaVel=parseInt(d.ultima_vel)||0;

    // Busca km percorrido da viagem
    const viagem = viagensMap[d.plate] || {};
    const km = parseFloat(viagem.km_percorrido)||0;
    const kmTotal = parseFloat(viagem.km_total_calculado)||0;
    const pct = kmTotal > 0 ? Math.min(Math.round(km/kmTotal*100),100) : 0;
    const kmHtml = km > 0
      ? '<div style="display:flex;align-items:center;gap:6px">'+
          '<span style="font-size:12px;font-weight:600">'+km+' km</span>'+
          (kmTotal > 0 ? '<div style="width:60px;height:5px;background:#e5e7eb;border-radius:3px">'+
            '<div style="height:100%;width:'+pct+'%;background:#d4a017;border-radius:3px"></div></div>'+
            '<span style="font-size:10px;color:#888">'+pct+'%</span>' : '')+
        '</div>'
      : '<span style="color:#aaa;font-size:12px">—</span>';

    rows+='<tr>'+
      '<td><b>'+d.plate+'</b></td>'+
      '<td><span class="'+(exc>0?'badge-danger':'badge-ok')+'">'+exc+'</span>'+
        '<span class="bar"><span class="bar-fill danger" style="width:'+Math.round(exc/maxExc*100)+'%;display:block"></span></span></td>'+
      '<td>'+formatarTempo(mov)+'<span class="bar"><span class="bar-fill" style="width:'+Math.round(mov/maxMov*100)+'%;display:block"></span></span></td>'+
      '<td>'+formatarTempo(par)+'</td>'+
      '<td><b>'+velMax+' km/h</b></td>'+
      '<td>'+kmHtml+'</td>'+
      '<td>'+(ultimaVel>5?'<span class="badge-ok">🟢 '+ultimaVel+'km/h</span>':'<span style="color:#888;font-size:12px">⚫ Parado</span>')+'</td>'+
    '</tr>';
  });

  document.getElementById('table-container').innerHTML=
    '<table><thead><tr>'+
    '<th onclick="sortBy(\'plate\')">Placa '+arrow('plate')+'</th>'+
    '<th onclick="sortBy(\'excessos\')">⚠️ Excessos '+arrow('excessos')+'</th>'+
    '<th onclick="sortBy(\'minutos_movendo\')">🟢 Em movimento '+arrow('minutos_movendo')+'</th>'+
    '<th onclick="sortBy(\'minutos_parado\')">⚫ Parado '+arrow('minutos_parado')+'</th>'+
    '<th onclick="sortBy(\'vel_max\')">🏎 Vel. máx '+arrow('vel_max')+'</th>'+
    '<th>📍 Km Percorrido</th>'+
    '<th>Status</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>';
}

function sortBy(col) {
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=-1;}
  filtrarTabela();
}

function filtrarTabela() {
  const q=document.getElementById('search').value.toLowerCase();
  renderTabela(dadosOriginais.filter(function(d){return d.plate.toLowerCase().includes(q);}));
}

carregarDashboard();
carregarFrota();
setInterval(carregarFrota, 60000);
</script>
</body>
</html>

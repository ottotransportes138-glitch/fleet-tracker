<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Tracker — Relatórios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<nav class="sidebar">
  <div class="logo">🚛 Fleet Tracker</div>
  <nav class="nav-links">
    <a href="index.html">Mapa ao vivo</a>
    <a href="routes.html">Rotas</a>
    <a href="vehicles.html">Veículos</a>
    <a href="alerts.html">Alertas</a>
    <a href="reports.html" class="active">Relatórios</a>
  </nav>
</nav>

<main style="flex:1;display:flex;flex-direction:column;">
  <!-- Filtros -->
  <div class="card" style="margin:0;border-radius:0;border-left:none;border-right:none;border-top:none;">
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
      <div class="form-group" style="flex:1;min-width:160px;margin:0">
        <label class="form-label">Veículo</label>
        <select class="form-input" id="r-vehicle"></select>
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Data início</label>
        <input class="form-input" id="r-from" type="datetime-local">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Data fim</label>
        <input class="form-input" id="r-to" type="datetime-local">
      </div>
      <button class="btn btn-primary" onclick="loadReport()">Gerar relatório</button>
    </div>
  </div>

  <div style="flex:1;display:flex;">
    <!-- Mapa do trajeto -->
    <div id="map" style="flex:1;min-height:300px;"></div>

    <!-- Tabela de posições -->
    <div style="width:320px;overflow-y:auto;border-left:1px solid var(--border);background:var(--bg2);">
      <table style="font-size:12px;">
        <thead style="position:sticky;top:0;background:var(--bg2);z-index:1;">
          <tr><th>Horário</th><th>Velocidade</th></tr>
        </thead>
        <tbody id="position-table">
          <tr><td colspan="2" class="muted" style="padding:16px">Selecione um veículo e período.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/config.js"></script>
<script>
const map = L.map('map').setView([-15.77, -47.92], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

let pathLayer = null;

// Pré-preenche datas (últimas 8h)
const now  = new Date();
const past = new Date(now - 8 * 3600 * 1000);
document.getElementById('r-to').value   = now.toISOString().slice(0,16);
document.getElementById('r-from').value = past.toISOString().slice(0,16);

async function loadVehicleOptions() {
  const res  = await fetch(`${CONFIG.API_URL}/api/vehicles`);
  const data = await res.json();
  const sel  = document.getElementById('r-vehicle');
  sel.innerHTML = data.map(v =>
    `<option value="${v.vehicle_id}">${v.plate} — ${v.name}</option>`
  ).join('');
}

async function loadReport() {
  const vehicleId = document.getElementById('r-vehicle').value;
  const from      = document.getElementById('r-from').value;
  const to        = document.getElementById('r-to').value;

  if (!vehicleId || !from || !to) return alert('Preencha todos os campos.');

  const res  = await fetch(
    `${CONFIG.API_URL}/api/positions/${vehicleId}?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`
  );
  const data = await res.json();

  if (!data.length) {
    document.getElementById('position-table').innerHTML =
      '<tr><td colspan="2" class="muted" style="padding:16px">Nenhuma posição neste período.</td></tr>';
    return;
  }

  // Desenha trajeto no mapa
  if (pathLayer) map.removeLayer(pathLayer);
  const coords = data.map(p => [p.lat, p.lng]);
  pathLayer = L.polyline(coords, { color: '#3b82f6', weight: 2 }).addTo(map);
  map.fitBounds(coords);

  // Marca início e fim
  L.circleMarker(coords[0], { radius:7, color:'#10b981', fillOpacity:1 }).addTo(map).bindTooltip('Início');
  L.circleMarker(coords[coords.length-1], { radius:7, color:'#ef4444', fillOpacity:1 }).addTo(map).bindTooltip('Fim');

  // Tabela
  document.getElementById('position-table').innerHTML = data.map(p => `
    <tr>
      <td>${new Date(p.recorded_at).toLocaleTimeString('pt-BR')}</td>
      <td style="color:${p.speed > 80 ? 'var(--warn)' : 'var(--text)'}">${p.speed} km/h</td>
    </tr>
  `).join('');
}

loadVehicleOptions();
</script>
</body>
</html>

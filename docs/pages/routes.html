<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otto GR — Histórico de Rotas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="../css/main.css"/>
<style>
  .routes-layout { display: flex; flex: 1; overflow: hidden; }
  .routes-panel  { width: 320px; flex-shrink: 0; background: #111; border-right: 3px solid #d4a017; display: flex; flex-direction: column; overflow-y: auto; }
  .panel-section { padding: 12px; border-bottom: 1px solid #333; }
  .panel-title   { font-size: 11px; font-weight: 700; color: #d4a017; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
  .vehicle-select { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 8px 10px; border-radius: 4px; font-size: 13px; }
  .date-input { width: 100%; background: #222; border: 1px solid #444; color: #fff; padding: 8px 10px; border-radius: 4px; font-size: 13px; margin-bottom: 8px; }
  .btn-gold { background: #d4a017; color: #111; border: none; padding: 8px 16px; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; }
  .btn-gold:hover { background: #b8860b; }
  .history-list { flex: 1; overflow-y: auto; padding: 8px; }
  .history-item { background: #1a1a1a; border: 1px solid #333; border-left: 3px solid #d4a017; border-radius: 4px; padding: 10px; margin-bottom: 6px; cursor: pointer; }
  .history-item:hover { background: #222; }
  .history-time { font-size: 12px; color: #d4a017; font-weight: 600; }
  .history-meta { font-size: 11px; color: #888; margin-top: 2px; }
  #route-map { flex: 1; }
  .stats-bar { background: #111; border-top: 2px solid #d4a017; padding: 8px 16px; display: flex; gap: 24px; font-size: 12px; color: #aaa; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-value { font-size: 16px; font-weight: 700; color: #d4a017; }
  .stat-label { font-size: 10px; color: #666; text-transform: uppercase; }
  .msg { color: #666; font-size: 12px; padding: 8px; }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">
    <img src="../img/logo.jpg" alt="Otto GR"/>
    <div class="logo-name">Otto Gerenciadora de Risco</div>
  </div>
  <nav class="nav-links">
    <a href="index.html">🗺 Mapa ao vivo</a>
    <a href="routes.html" class="active">🛣 Rotas</a>
    <a href="vehicles.html">🚛 Veículos</a>
    <a href="alerts.html">⚠️ Alertas</a>
    <a href="reports.html">📊 Relatórios</a>
  </nav>
</nav>

<div class="routes-layout">
  <div class="routes-panel">
    <div class="panel-section">
      <div class="panel-title">Histórico de Trajeto</div>
      <div class="form-group">
        <label class="form-label" style="color:#888">Veículo</label>
        <select class="vehicle-select" id="vehicle-select">
          <option value="">Carregando...</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" style="color:#888">Data início</label>
        <input type="datetime-local" class="date-input" id="date-start"/>
      </div>
      <div class="form-group">
        <label class="form-label" style="color:#888">Data fim</label>
        <input type="datetime-local" class="date-input" id="date-end"/>
      </div>
      <button class="btn-gold" onclick="buscarHistorico()">🔍 Buscar Trajeto</button>
    </div>
    <div class="panel-section" style="flex:1;overflow-y:auto">
      <div class="panel-title">Posições</div>
      <div id="history-list"><p class="msg">Selecione um veículo e período.</p></div>
    </div>
  </div>

  <div style="flex:1;display:flex;flex-direction:column">
    <div id="route-map"></div>
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat"><div class="stat-value" id="stat-pontos">0</div><div class="stat-label">Posições</div></div>
      <div class="stat"><div class="stat-value" id="stat-maxvel">0</div><div class="stat-label">Vel. máx km/h</div></div>
      <div class="stat"><div class="stat-value" id="stat-medvel">0</div><div class="stat-label">Vel. média km/h</div></div>
      <div class="stat"><div class="stat-value" id="stat-duracao">—</div><div class="stat-label">Duração</div></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/config.js"></script>
<script>
const map = L.map('route-map').setView([-15.77, -47.92], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);

let polyline = null;
let markersLayer = [];

// Datas padrão
const now = new Date();
const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0);
const fmt = d => d.toISOString().slice(0,16);
document.getElementById('date-start').value = fmt(startOfDay);
document.getElementById('date-end').value = fmt(now);

async function loadVehicles() {
  try {
    const res = await fetch(`${CONFIG.API_URL}/api/vehicles`);
    const data = await res.json();
    const sel = document.getElementById('vehicle-select');
    sel.innerHTML = '<option value="">Selecione um veículo...</option>';
    data.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.plate}`;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.error('Erro ao carregar veículos:', e);
  }
}

async function buscarHistorico() {
  const vehicleId = document.getElementById('vehicle-select').value;
  const start = document.getElementById('date-start').value;
  const end = document.getElementById('date-end').value;

  if (!vehicleId) { alert('Selecione um veículo!'); return; }
  if (!start || !end) { alert('Informe o período!'); return; }

  document.getElementById('history-list').innerHTML = '<p class="msg">Buscando...</p>';

  try {
    const url = `${CONFIG.API_URL}/api/positions?vehicle_id=${vehicleId}&start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
    console.log('Buscando:', url);
    const res = await fetch(url);
    const positions = await res.json();

    console.log('Posições recebidas:', positions.length);

    if (polyline) map.removeLayer(polyline);
    markersLayer.forEach(m => map.removeLayer(m));
    markersLayer = [];

    if (!Array.isArray(positions) || positions.length === 0) {
      document.getElementById('history-list').innerHTML = '<p class="msg">Nenhuma posição encontrada.</p>';
      document.getElementById('stats-bar').style.display = 'none';
      return;
    }

    const coords = positions.map(p => [parseFloat(p.lat), parseFloat(p.lng)]);
    polyline = L.polyline(coords, { color: '#d4a017', weight: 3, opacity: 0.8 }).addTo(map);

    const startMarker = L.circleMarker(coords[0], { radius: 8, color: '#10b981', fillColor: '#10b981', fillOpacity: 1 }).addTo(map).bindTooltip('🟢 Início');
    const endMarker = L.circleMarker(coords[coords.length-1], { radius: 8, color: '#ef4444', fillColor: '#ef4444', fillOpacity: 1 }).addTo(map).bindTooltip('🔴 Fim');
    markersLayer.push(startMarker, endMarker);

    map.fitBounds(polyline.getBounds(), { padding: [40, 40] });

    document.getElementById('history-list').innerHTML = positions.map(p => `
      <div class="history-item" onclick="map.setView([${p.lat}, ${p.lng}], 16)">
        <div class="history-time">${new Date(p.recorded_at).toLocaleTimeString('pt-BR')}</div>
        <div class="history-meta">${p.speed || 0} km/h · ${Number(p.lat).toFixed(4)}, ${Number(p.lng).toFixed(4)}</div>
      </div>
    `).join('');

    const speeds = positions.map(p => p.speed || 0);
    const maxVel = Math.max(...speeds);
    const medVel = Math.round(speeds.reduce((a,b) => a+b, 0) / speeds.length);
    const durMs = new Date(positions[positions.length-1].recorded_at) - new Date(positions[0].recorded_at);
    const durMin = Math.round(durMs / 60000);
    const durStr = durMin >= 60 ? `${Math.floor(durMin/60)}h ${durMin%60}min` : `${durMin}min`;

    document.getElementById('stat-pontos').textContent = positions.length;
    document.getElementById('stat-maxvel').textContent = maxVel;
    document.getElementById('stat-medvel').textContent = medVel;
    document.getElementById('stat-duracao').textContent = durStr;
    document.getElementById('stats-bar').style.display = 'flex';

  } catch(e) {
    console.error('Erro:', e);
    document.getElementById('history-list').innerHTML = '<p class="msg" style="color:#ef4444">Erro ao buscar trajeto.</p>';
  }
}

loadVehicles();
</script>
</body>
</html>

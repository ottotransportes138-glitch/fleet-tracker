<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Tracker — Veículos</title>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<nav class="sidebar">
  <div class="logo">🚛 Fleet Tracker</div>
  <nav class="nav-links">
    <a href="index.html">Mapa ao vivo</a>
    <a href="routes.html">Rotas</a>
    <a href="vehicles.html" class="active">Veículos</a>
    <a href="alerts.html">Alertas</a>
    <a href="reports.html">Relatórios</a>
  </nav>
</nav>

<div class="page">
  <div class="page-title">Veículos cadastrados</div>

  <!-- Formulário -->
  <div class="card" style="max-width:480px;margin-bottom:24px">
    <div style="font-size:13px;font-weight:500;margin-bottom:14px;font-family:'IBM Plex Mono',monospace" id="form-title">Novo veículo</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Placa</label>
        <input class="form-input" id="v-plate" placeholder="ABC-1234">
      </div>
      <div class="form-group">
        <label class="form-label">Nome / apelido</label>
        <input class="form-input" id="v-name" placeholder="Caminhão 01">
      </div>
      <div class="form-group">
        <label class="form-label">ID Omnilink</label>
        <input class="form-input" id="v-omnilink" placeholder="ID do dispositivo">
      </div>
      <div class="form-group">
        <label class="form-label">Limite de velocidade (km/h)</label>
        <input class="form-input" id="v-speed" type="number" value="80" min="30" max="200">
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-ghost" onclick="resetForm()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveVehicle()">Salvar</button>
    </div>
  </div>

  <!-- Tabela -->
  <div class="card" style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>Placa</th>
          <th>Nome</th>
          <th>ID Omnilink</th>
          <th>Limite km/h</th>
          <th>Rota atual</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="vehicles-table"><tr><td colspan="7" class="muted" style="padding:20px">Carregando...</td></tr></tbody>
    </table>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
let editingId = null;
let allRoutes = [];

async function loadRoutes() {
  const res = await fetch(`${CONFIG.API_URL}/api/routes`);
  allRoutes = await res.json();
}

async function loadVehicles() {
  const res  = await fetch(`${CONFIG.API_URL}/api/vehicles`);
  const data = await res.json();
  const tbody = document.getElementById('vehicles-table');

  tbody.innerHTML = data.map(v => `
    <tr>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:500">${v.plate}</td>
      <td>${v.name}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted)">${v.omnilink_id}</td>
      <td>${v.speed_limit} km/h</td>
      <td>
        <select style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px" onchange="assignRoute('${v.vehicle_id}', this.value)">
          <option value="">— sem rota —</option>
          ${allRoutes.map(r => `<option value="${r.id}" ${r.id === v.route_id ? 'selected' : ''}>${r.name}</option>`).join('')}
        </select>
      </td>
      <td><span class="tag tag-ok">Ativo</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick='editVehicle(${JSON.stringify(v)})'>Editar</button>
        <button class="btn btn-danger" style="font-size:11px;padding:4px 10px" onclick="deleteVehicle('${v.vehicle_id}')">Remover</button>
      </td>
    </tr>
  `).join('') || `<tr><td colspan="7" class="muted" style="padding:20px">Nenhum veículo cadastrado</td></tr>`;
}

async function saveVehicle() {
  const body = {
    plate:       document.getElementById('v-plate').value.trim().toUpperCase(),
    name:        document.getElementById('v-name').value.trim(),
    omnilink_id: document.getElementById('v-omnilink').value.trim(),
    speed_limit: parseInt(document.getElementById('v-speed').value),
  };
  if (!body.plate || !body.name || !body.omnilink_id) { alert('Preencha todos os campos'); return; }

  const url    = editingId ? `${CONFIG.API_URL}/api/vehicles/${editingId}` : `${CONFIG.API_URL}/api/vehicles`;
  const method = editingId ? 'PUT' : 'POST';
  await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  resetForm();
  loadVehicles();
}

function editVehicle(v) {
  editingId = v.vehicle_id;
  document.getElementById('v-plate').value   = v.plate;
  document.getElementById('v-name').value    = v.name;
  document.getElementById('v-omnilink').value = v.omnilink_id;
  document.getElementById('v-speed').value   = v.speed_limit;
  document.getElementById('form-title').textContent = 'Editar veículo';
}

function resetForm() {
  editingId = null;
  ['v-plate','v-name','v-omnilink'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('v-speed').value = 80;
  document.getElementById('form-title').textContent = 'Novo veículo';
}

async function deleteVehicle(id) {
  if (!confirm('Remover este veículo?')) return;
  await fetch(`${CONFIG.API_URL}/api/vehicles/${id}`, { method: 'DELETE' });
  loadVehicles();
}

async function assignRoute(vehicleId, routeId) {
  if (!routeId) return;
  await fetch(`${CONFIG.API_URL}/api/routes/${routeId}/assign`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ vehicle_id: vehicleId }),
  });
}

(async () => { await loadRoutes(); await loadVehicles(); })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otto GR — Cadastros</title>
<link rel="stylesheet" href="../css/main.css"/>
<style>
  .page { flex:1; padding:20px; overflow-y:auto; background:#f5f5f5; }
  .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .page-header h1 { font-size:18px; font-weight:700; color:#111; }
  .card { background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.08); overflow:hidden; }
  .tab-bar { display:flex; border-bottom:2px solid #d4a017; }
  .tab-btn { padding:12px 28px; font-size:13px; font-weight:700; color:#888; background:transparent; border:none; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:.15s; }
  .tab-btn.active { color:#111; border-bottom-color:#d4a017; }
  .tab-btn:hover { color:#d4a017; }
  .tab-content { display:none; padding:24px; }
  .tab-content.active { display:block; }
  .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .btn-add { background:#111; color:#d4a017; border:none; border-radius:6px; padding:8px 16px; font-size:12px; font-weight:700; cursor:pointer; }
  .btn-add:hover { background:#222; }
  .search-input { border:1px solid #ddd; border-radius:4px; padding:7px 12px; font-size:13px; width:250px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { background:#111; color:#d4a017; padding:10px 12px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; }
  td { padding:10px 12px; border-bottom:1px solid #f0f0f0; }
  tr:hover td { background:#fffbf0; }
  .btn-edit { background:#f3f4f6; color:#111; border:none; border-radius:4px; padding:4px 10px; font-size:11px; cursor:pointer; }
  .btn-del { background:#fee2e2; color:#dc2626; border:none; border-radius:4px; padding:4px 10px; font-size:11px; cursor:pointer; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:#fff; border-radius:8px; padding:24px; width:420px; max-width:95vw; }
  .modal h3 { font-size:15px; font-weight:700; margin-bottom:16px; }
  .form-group { margin-bottom:12px; }
  .form-label { font-size:12px; color:#555; font-weight:600; display:block; margin-bottom:4px; }
  .form-input { width:100%; border:1px solid #ddd; border-radius:4px; padding:8px 10px; font-size:13px; }
  .form-input:focus { outline:none; border-color:#d4a017; }
  .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
  .btn-save { background:#d4a017; color:#111; border:none; border-radius:4px; padding:8px 20px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-cancel { background:#f3f4f6; color:#555; border:none; border-radius:4px; padding:8px 16px; font-size:13px; cursor:pointer; }
  .empty { text-align:center; color:#888; padding:32px; }
</style>
</head>
<body>
<script>if(sessionStorage.getItem("ottogrLogado")!=="true"){window.location.href="../index.html";}</script>
<nav class="sidebar">
  <div class="logo">
    <img src="../img/logo.jpg" alt="Otto GR" onerror="this.style.display='none'"/>
    <div class="logo-name">Otto Gerenciadora de Risco</div>
  </div>
  <nav class="nav-links">
    <a href="index.html">🗺 Mapa ao vivo</a>
    <a href="routes.html">🛣 Rotas</a>
    <a href="vehicles.html">🚛 Veículos</a>
    <a href="frota.html?tipo=RODOTREM">🚛 Rodotrem</a>
    <a href="frota.html?tipo=LS">🚚 LS</a>
    <a href="cadastros.html" class="active">📋 Cadastros</a>
    <a href="viagens.html">📦 Viagens</a>
    <a href="alerts.html">⚠️ Alertas</a>
    <a href="reports.html">📊 Dashboard</a>
  </nav>
  <div style="margin-top:auto;position:relative">
    <div class="gear-menu" id="gear-menu">
      <a href="config.html">⚙️ Configurações</a>
      <a href="#" onclick="abrirConta()">👤 Conta</a>
      <a href="../index.html" onclick="sessionStorage.removeItem('ottogrLogado')">🚪 Sair</a>
    </div>
    <button class="gear-btn" onclick="toggleGear()">
      <span class="gear-icon">⚙️</span>
      <span>Configurações</span>
    </button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📋 Cadastros</h1>
  </div>
  <div class="card">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="setTab('motoristas')">👨 Motoristas</button>
      <button class="tab-btn" onclick="setTab('clientes')">🏢 Clientes</button>
    </div>

    <!-- ABA MOTORISTAS -->
    <div class="tab-content active" id="tab-motoristas">
      <div class="section-header">
        <input class="search-input" placeholder="🔍 Buscar motorista..." oninput="filtrarMotoristas(this.value)"/>
        <button class="btn-add" onclick="abrirModal('motorista')">+ Novo Motorista</button>
      </div>
      <table>
        <thead><tr><th>Nome</th><th>CPF</th><th>CNH</th><th>Telefone</th><th>Ações</th></tr></thead>
        <tbody id="tabela-motoristas"><tr><td colspan="5" class="empty">⏳ Carregando...</td></tr></tbody>
      </table>
    </div>

    <!-- ABA CLIENTES -->
    <div class="tab-content" id="tab-clientes">
      <div class="section-header">
        <input class="search-input" placeholder="🔍 Buscar cliente..." oninput="filtrarClientes(this.value)"/>
        <button class="btn-add" onclick="abrirModal('cliente')">+ Novo Cliente</button>
      </div>
      <table>
        <thead><tr><th>Nome/Razão Social</th><th>CNPJ</th><th>Telefone</th><th>Ações</th></tr></thead>
        <tbody id="tabela-clientes"><tr><td colspan="4" class="empty">⏳ Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Motorista -->
<div class="modal-overlay" id="modal-motorista">
  <div class="modal">
    <h3 id="modal-motorista-titulo">👨 Novo Motorista</h3>
    <div class="form-group"><label class="form-label">Nome completo *</label><input class="form-input" id="m-nome" placeholder="Ex: João Silva"/></div>
    <div class="form-group"><label class="form-label">CPF</label><input class="form-input" id="m-cpf" placeholder="000.000.000-00"/></div>
    <div class="form-group"><label class="form-label">CNH</label><input class="form-input" id="m-cnh" placeholder="Número da CNH"/></div>
    <div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="m-tel" placeholder="(00) 00000-0000"/></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModal('motorista')">Cancelar</button>
      <button class="btn-save" onclick="salvarMotorista()">💾 Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Cliente -->
<div class="modal-overlay" id="modal-cliente">
  <div class="modal">
    <h3 id="modal-cliente-titulo">🏢 Novo Cliente</h3>
    <div class="form-group"><label class="form-label">Nome/Razão Social *</label><input class="form-input" id="c-nome" placeholder="Ex: Coca-Cola"/></div>
    <div class="form-group"><label class="form-label">CNPJ</label><input class="form-input" id="c-cnpj" placeholder="00.000.000/0000-00"/></div>
    <div class="form-group"><label class="form-label">Telefone</label><input class="form-input" id="c-tel" placeholder="(00) 00000-0000"/></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="fecharModal('cliente')">Cancelar</button>
      <button class="btn-save" onclick="salvarCliente()">💾 Salvar</button>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script>
let motoristas = [], clientes = [], editandoId = null;

async function carregarMotoristas() {
  const res = await fetch(CONFIG.API_URL + '/api/cadastros/motoristas');
  motoristas = await res.json();
  renderMotoristas(motoristas);
}

async function carregarClientes() {
  const res = await fetch(CONFIG.API_URL + '/api/cadastros/clientes');
  clientes = await res.json();
  renderClientes(clientes);
}

function renderMotoristas(lista) {
  const tbody = document.getElementById('tabela-motoristas');
  if (!lista.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">Nenhum motorista cadastrado.</td></tr>'; return; }
  tbody.innerHTML = lista.map(m => '<tr><td><b>' + m.nome + '</b></td><td>' + (m.cpf||'—') + '</td><td>' + (m.cnh||'—') + '</td><td>' + (m.telefone||'—') + '</td><td style="display:flex;gap:4px"><button class="btn-edit" onclick="editarMotorista(' + m.id + ')">✏️</button><button class="btn-del" onclick="deletarMotorista(' + m.id + ')">🗑️</button></td></tr>').join('');
}

function renderClientes(lista) {
  const tbody = document.getElementById('tabela-clientes');
  if (!lista.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">Nenhum cliente cadastrado.</td></tr>'; return; }
  tbody.innerHTML = lista.map(c => '<tr><td><b>' + c.nome + '</b></td><td>' + (c.cnpj||'—') + '</td><td>' + (c.telefone||'—') + '</td><td style="display:flex;gap:4px"><button class="btn-edit" onclick="editarCliente(' + c.id + ')">✏️</button><button class="btn-del" onclick="deletarCliente(' + c.id + ')">🗑️</button></td></tr>').join('');
}

function filtrarMotoristas(q) { renderMotoristas(motoristas.filter(m => m.nome.toLowerCase().includes(q.toLowerCase()))); }
function filtrarClientes(q) { renderClientes(clientes.filter(c => c.nome.toLowerCase().includes(q.toLowerCase()))); }

function setTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => { b.classList.remove('active'); if((i===0&&tab==='motoristas')||(i===1&&tab==='clientes')) b.classList.add('active'); });
  document.getElementById('tab-motoristas').classList.remove('active');
  document.getElementById('tab-clientes').classList.remove('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function abrirModal(tipo) {
  editandoId = null;
  if (tipo === 'motorista') {
    document.getElementById('modal-motorista-titulo').textContent = '👨 Novo Motorista';
    ['m-nome','m-cpf','m-cnh','m-tel'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-motorista').classList.add('open');
  } else {
    document.getElementById('modal-cliente-titulo').textContent = '🏢 Novo Cliente';
    ['c-nome','c-cnpj','c-tel'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('modal-cliente').classList.add('open');
  }
}

function fecharModal(tipo) { document.getElementById('modal-'+tipo).classList.remove('open'); }

async function salvarMotorista() {
  const nome = document.getElementById('m-nome').value.trim();
  if (!nome) { alert('Nome obrigatório!'); return; }
  const body = { nome, cpf: document.getElementById('m-cpf').value.trim(), cnh: document.getElementById('m-cnh').value.trim(), telefone: document.getElementById('m-tel').value.trim() };
  const url = CONFIG.API_URL + '/api/cadastros/motoristas' + (editandoId ? '/'+editandoId : '');
  const method = editandoId ? 'PUT' : 'POST';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  fecharModal('motorista');
  carregarMotoristas();
}

async function salvarCliente() {
  const nome = document.getElementById('c-nome').value.trim();
  if (!nome) { alert('Nome obrigatório!'); return; }
  const body = { nome, cnpj: document.getElementById('c-cnpj').value.trim(), telefone: document.getElementById('c-tel').value.trim() };
  const url = CONFIG.API_URL + '/api/cadastros/clientes' + (editandoId ? '/'+editandoId : '');
  const method = editandoId ? 'PUT' : 'POST';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  fecharModal('cliente');
  carregarClientes();
}

function editarMotorista(id) {
  editandoId = id;
  const m = motoristas.find(x => x.id === id);
  document.getElementById('modal-motorista-titulo').textContent = '✏️ Editar Motorista';
  document.getElementById('m-nome').value = m.nome || '';
  document.getElementById('m-cpf').value = m.cpf || '';
  document.getElementById('m-cnh').value = m.cnh || '';
  document.getElementById('m-tel').value = m.telefone || '';
  document.getElementById('modal-motorista').classList.add('open');
}

function editarCliente(id) {
  editandoId = id;
  const c = clientes.find(x => x.id === id);
  document.getElementById('modal-cliente-titulo').textContent = '✏️ Editar Cliente';
  document.getElementById('c-nome').value = c.nome || '';
  document.getElementById('c-cnpj').value = c.cnpj || '';
  document.getElementById('c-tel').value = c.telefone || '';
  document.getElementById('modal-cliente').classList.add('open');
}

async function deletarMotorista(id) {
  if (!confirm('Remover motorista?')) return;
  await fetch(CONFIG.API_URL + '/api/cadastros/motoristas/' + id, { method: 'DELETE' });
  carregarMotoristas();
}

async function deletarCliente(id) {
  if (!confirm('Remover cliente?')) return;
  await fetch(CONFIG.API_URL + '/api/cadastros/clientes/' + id, { method: 'DELETE' });
  carregarClientes();
}

function toggleGear() { document.getElementById('gear-menu').classList.toggle('open'); }
function abrirConta() { alert('Usuário: ' + (sessionStorage.getItem('ottogrUsuario')||'adm')); }

carregarMotoristas();
carregarClientes();
</script>
</body>
</html>

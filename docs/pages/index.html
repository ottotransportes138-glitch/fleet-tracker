<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otto GR — Mapa ao Vivo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="../css/main.css"/>
<style>
  .map-wrapper { display:flex; flex:1; overflow:hidden; }
  #map { flex:1; height:100%; }
  .vehicles-panel { width:290px; flex-shrink:0; background:#111; border-left:3px solid #d4a017; display:flex; flex-direction:column; overflow:hidden; }
  .vehicles-panel-title { padding:10px 14px; font-size:11px; font-weight:700; color:#d4a017; text-transform:uppercase; letter-spacing:.08em; border-bottom:1px solid #222; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
  .tab-bar { display:flex; flex-shrink:0; border-bottom:1px solid #222; }
  .tab-btn { flex:1; padding:8px 4px; font-size:11px; font-weight:700; color:#666; background:transparent; border:none; cursor:pointer; text-transform:uppercase; letter-spacing:.05em; border-bottom:3px solid transparent; transition:.15s; }
  .tab-btn.active { color:#d4a017; border-bottom-color:#d4a017; }
  .tab-btn:hover { color:#d4a017; }
  .vehicles-panel-list { flex:1; overflow-y:auto; }
  .vehicles-panel-list::-webkit-scrollbar { width:4px; }
  .vehicles-panel-list::-webkit-scrollbar-track { background:#111; }
  .vehicles-panel-list::-webkit-scrollbar-thumb { background:#444; border-radius:2px; }
  .count-badge { background:#d4a017; color:#111; font-size:10px; font-weight:800; padding:1px 6px; border-radius:10px; }
</style>
</head>
<body>
<nav class="sidebar">
  <div class="logo">
    <img src="../img/logo.jpg" alt="Otto GR" onerror="this.style.display='none'"/>
    <div class="logo-name">Otto Gerenciadora de Risco</div>
  </div>
  <nav class="nav-links">
    <a href="index.html" class="active">🗺 Mapa ao vivo</a>
    <a href="routes.html">🛣 Rotas</a>
    <a href="vehicles.html">🚛 Veículos</a>
    <a href="frota.html?tipo=RODOTREM">🚛 Rodotrem</a>
    <a href="frota.html?tipo=LS">🚚 LS</a>
    <a href="vehicles.html" style="display:none">🚛 Veículos</a>
    <a href="viagens.html">📦 Viagens</a>
    <a href="alerts.html">⚠️ Alertas <span class="badge" id="alert-count">0</span></a>
    <a href="reports.html">📊 Dashboard</a>
  </nav>
</nav>

<div class="map-wrapper">
  <main class="map-container" style="flex:1;display:flex;flex-direction:column">
    <div id="map" style="flex:1"></div>
    <div class="status-bar">
      <span id="ws-status" class="status-dot offline"></span>
      <span id="ws-label">Conectando...</span>
      <span class="ml-auto" id="last-update">—</span>
    </div>
  </main>

  <div class="vehicles-panel">
    <div class="vehicles-panel-title">
      🚛 Veículos Ativos
      <span class="count-badge" id="count-total">0</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-todos" onclick="setTab('todos')">Todos</button>
      <button class="tab-btn" id="tab-RODOTREM" onclick="setTab('RODOTREM')">Rodotrem</button>
      <button class="tab-btn" id="tab-LS" onclick="setTab('LS')">LS</button>
    </div>
    <div class="vehicles-panel-list" id="vehicle-list">
      <p style="padding:12px;color:#666;font-size:12px">Carregando...</p>
    </div>
  </div>
</div>

<div class="alert-toast hidden" id="alert-toast"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/config.js"></script>
<script src="../js/map.js"></script>
<script src="../js/websocket.js"></script>
</body>
</html>
